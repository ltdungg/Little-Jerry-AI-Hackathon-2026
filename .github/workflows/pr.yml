name: PR Validation
on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest
      - run: pip-audit
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check
      - run: terraform plan
